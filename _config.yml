# Florida Coastal Prep Sports Academy - Jekyll Configuration
title: "Florida Coastal Prep"
tagline: "Where Future College Athletes Are Made"
description: "Florida Coastal Prep (FCP) — post-graduate and high school basketball academy in Fort Walton Beach, FL. 500+ college placements across 43 states and 22 countries. 14,000 sq ft Spartan Training Center. NCAA-approved academics. Founded by Lee DeForest."
url: "https://floridacoastalprep.com"
baseurl: ""

# Contact
email: info@floridacoastalprep.com
phone: "850-961-2323"
phone_alt: "850-360-2323"
address: "33 Jet Drive NW, Fort Walton Beach, FL 32548"
hours: "Mon-Fri 8AM-5PM | Sat 8AM-1PM"

# Social
social:
  twitter: "https://x.com/FLCoastalPrep"
  instagram: "https://instagram.com/FLCoastalPrep"
  facebook: "https://facebook.com/FloridaCoastalPrep"
  youtube: "https://youtube.com/@floridacoastalprep"
  tiktok: "https://www.tiktok.com/@flcoastalprep"

# Build
markdown: kramdown
permalink: /:title/
sass:
  style: compressed
include:
  - _redirects

# Collections for organized pages
collections:
  pages:
    output: true
    permalink: /:path/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Sitemap exclusions for non-content pages (static files without front matter)
  - scope:
      path: "admin"
    values:
      sitemap: false
  - scope:
      path: "offline.html"
    values:
      sitemap: false

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - backups
