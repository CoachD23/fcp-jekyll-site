<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Netlify Form Test</title></head>
<body>
<h1>Netlify Form Detection Test</h1>
<form name="netlify-detection-test" method="POST" data-netlify="true" netlify>
  <input type="hidden" name="form-name" value="netlify-detection-test" />
  <label>Name: <input type="text" name="name" /></label>
  <label>Email: <input type="email" name="email" /></label>
  <button type="submit">Submit</button>
</form>
</body>
</html>
