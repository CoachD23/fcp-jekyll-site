backend:
  name: git-gateway
  branch: master

media_folder: "assets/images"
public_folder: "/assets/images"

# Disable editor preview (Jekyll uses Liquid templates — no live preview)
editor:
  preview: false

collections:
  # ─── Blog Posts ───────────────────────────────────
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "Blog"
        field: layout
        pattern: "post"
      - label: "Alumni"
        field: layout
        pattern: "alumni-post"
    fields:
      - { label: "Layout", name: "layout", widget: "select", options: ["post", "alumni-post"], default: "post" }
      - { label: "Title", name: "title", widget: "string", hint: "50-60 characters, keyword-rich" }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Categories", name: "categories", widget: "select", options: ["highlights", "alumni", "recruiting", "news", "training"], multiple: true }
      - { label: "Featured Image", name: "image", widget: "image", hint: "Upload to /assets/images/blog/ — never reuse blog-default.jpg" }
      - { label: "Meta Description", name: "description", widget: "string", hint: "150-160 characters with keywords for SEO" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentence preview shown on the blog listing page" }
      - label: "Alumni Fields (only for alumni-post layout)"
        name: "alumni_fields"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Player Name", name: "player_name", widget: "string", required: false }
          - { label: "Current Team", name: "current_team", widget: "string", required: false }
          - { label: "FCP Label", name: "fcp_label", widget: "string", default: "FCP Spartans", required: false }
          - { label: "FCP Photo", name: "image_fcp", widget: "image", required: false }
          - { label: "Player Bio (HTML allowed)", name: "bio", widget: "text", required: false }
          - label: "Stats"
            name: "stats"
            widget: "list"
            required: false
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  # ─── Program Pages ────────────────────────────────
  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Post Grad"
        name: "post-grad"
        file: "post-grad.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "High School"
        name: "high-school"
        file: "high-school.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Training"
        name: "training"
        file: "training.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Academics"
        name: "academics"
        file: "academics.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Housing"
        name: "housing"
        file: "housing.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Coaches"
        name: "coaches"
        file: "coaches.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Tuition"
        name: "tuition"
        file: "tuition.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Testimonials"
        name: "testimonials"
        file: "testimonials.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "FAQ"
        name: "faq"
        file: "faq.html"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "string" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Body", name: "body", widget: "code", default_language: "html" }
