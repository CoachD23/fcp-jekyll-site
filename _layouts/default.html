<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body_class }}">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {% include nav.html %}
  <main id="main-content">
    {{ content }}
  </main>
  {% unless page.url == "/" or page.hide_connect_form %}
    {% include connect-form.html %}
  {% endunless %}
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
  {% if jekyll.environment == "production" %}
  <!-- GA4: defer until after main thread is free -->
  <script>
  function loadGA4(){var s=document.createElement('script');s.src='https://www.googletagmanager.com/gtag/js?id=G-0J66GRZ7SW';s.async=true;document.head.appendChild(s);window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}window.gtag=gtag;gtag('js',new Date());gtag('config','G-0J66GRZ7SW');gtag('config','AW-11158472206');}
  if('requestIdleCallback' in window){requestIdleCallback(loadGA4);}else{setTimeout(loadGA4,2000);}
  </script>
  {% endif %}

  <!-- Netlify Identity redirect (after CMS login, go to /admin/) -->
  <script>
  (function ni(){if(window.netlifyIdentity){window.netlifyIdentity.on("init",function(u){if(!u){window.netlifyIdentity.on("login",function(){document.location.href="/admin/";})}});}else if(document.cookie.indexOf('nf_jwt')>-1){setTimeout(ni,200);}})();
  </script>

  <!-- Service Worker -->
  <script>
  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
  </script>

</body>
</html>
