<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body_class }}">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  {% include nav.html %}
  <main id="main-content">
    {{ content }}
  </main>
  {% unless page.url == "/" %}
    {% include connect-form.html %}
  {% endunless %}
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
  {% if jekyll.environment == "production" %}
  <!-- GA4: defer until after main thread is free -->
  <script>
  function loadGA4(){var s=document.createElement('script');s.src='https://www.googletagmanager.com/gtag/js?id=G-0J66GRZ7SW';s.async=true;document.head.appendChild(s);window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}window.gtag=gtag;gtag('js',new Date());gtag('config','G-0J66GRZ7SW');}
  if('requestIdleCallback' in window){requestIdleCallback(loadGA4,{timeout:5000});}else{setTimeout(loadGA4,5000);}
  </script>
  {% endif %}

  <!-- GHL Chat Widget: defer until user interaction or 5s idle -->
  <script>
  (function(){var d=false;function l(){if(d)return;d=true;var s=document.createElement('script');s.src='https://widgets.leadconnectorhq.com/loader.js';s.setAttribute('data-resources-url','https://widgets.leadconnectorhq.com/chat-widget/loader.js');s.setAttribute('data-widget-id','jBDUi7Sma6tCl3eXKBmX');document.body.appendChild(s);}
  ['scroll','mousemove','touchstart','keydown','click'].forEach(function(e){window.addEventListener(e,l,{once:true,passive:true});});setTimeout(l,5000);})();
  </script>

  <!-- Netlify Identity redirect (after CMS login, go to /admin/) -->
  <script>
  (function ni(){if(window.netlifyIdentity){window.netlifyIdentity.on("init",function(u){if(!u){window.netlifyIdentity.on("login",function(){document.location.href="/admin/";})}});}else if(document.cookie.indexOf('nf_jwt')>-1){setTimeout(ni,200);}})();
  </script>

  <!-- Service Worker -->
  <script>
  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}
  </script>

  <!-- Social Proof Toast -->
  <div class="social-proof-toast" id="socialProofToast" aria-live="polite" aria-atomic="true">
    <div class="social-proof-toast-icon">🏀</div>
    <div class="social-proof-toast-body">
      <p class="social-proof-toast-msg" id="socialProofMsg"></p>
      <span class="social-proof-toast-time" id="socialProofTime"></span>
    </div>
    <button class="social-proof-toast-close" aria-label="Dismiss notification" id="socialProofClose">&times;</button>
  </div>
  <script>
  (function(){
    var toast=document.getElementById('socialProofToast');
    if(!toast)return;

    // Never show on /apply/
    if(window.location.pathname.replace(/\/$/,'')==='/apply')return;

    var msgEl=document.getElementById('socialProofMsg');
    var timeEl=document.getElementById('socialProofTime');
    var closeBtn=document.getElementById('socialProofClose');
    var dismissed=false;
    var showTimer,hideTimer;

    var families=[
      {city:'Atlanta',state:'GA'},{city:'Houston',state:'TX'},{city:'Miami',state:'FL'},
      {city:'Charlotte',state:'NC'},{city:'Orlando',state:'FL'},{city:'Nashville',state:'TN'},
      {city:'Dallas',state:'TX'},{city:'Tampa',state:'FL'},{city:'Chicago',state:'IL'},
      {city:'Phoenix',state:'AZ'},{city:'Jacksonville',state:'FL'},{city:'Memphis',state:'TN'},
      {city:'San Antonio',state:'TX'},{city:'Indianapolis',state:'IN'},{city:'Columbus',state:'OH'},
      {city:'Raleigh',state:'NC'},{city:'Birmingham',state:'AL'},{city:'Louisville',state:'KY'},
      {city:'Richmond',state:'VA'},{city:'New Orleans',state:'LA'},{city:'Kansas City',state:'MO'},
      {city:'Baton Rouge',state:'LA'},{city:'Pensacola',state:'FL'},{city:'Tallahassee',state:'FL'},
      {city:'Savannah',state:'GA'},{city:'Mobile',state:'AL'},{city:'Little Rock',state:'AR'},
      {city:'Fort Worth',state:'TX'},{city:'Oklahoma City',state:'OK'},{city:'Columbia',state:'SC'}
    ];

    var times=['2 minutes ago','5 minutes ago','8 minutes ago','12 minutes ago','15 minutes ago','just now','3 minutes ago','6 minutes ago'];

    function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
    shuffle(families);
    var idx=0;

    // 30-minute cooldown
    try{var last=localStorage.getItem('fcp_toast_last_shown');if(last&&(Date.now()-parseInt(last,10))<1800000)return;}catch(e){}

    // Manual dismiss persists for session
    try{if(sessionStorage.getItem('fcp_toast_session_count')==='done')return;}catch(e){}

    // Return visitor detection
    var isReturn=false;
    try{isReturn=localStorage.getItem('fcp_toast_is_return')==='1';if(!isReturn)localStorage.setItem('fcp_toast_is_return','1');}catch(e){}

    // Max shows per session (stable across page navigations)
    var maxShows;
    try{var sm=sessionStorage.getItem('fcp_toast_max_shows');if(sm){maxShows=parseInt(sm,10);}else{maxShows=isReturn?1:Math.floor(Math.random()*3)+1;sessionStorage.setItem('fcp_toast_max_shows',String(maxShows));}}catch(e){maxShows=1;}

    // Session show count
    var sessionCount=0;
    try{var sc=sessionStorage.getItem('fcp_toast_session_count');if(sc&&sc!=='done')sessionCount=parseInt(sc,10)||0;}catch(e){}
    if(sessionCount>=maxShows)return;

    // Random delay: 11-50 seconds
    function randomDelay(){return Math.floor(Math.random()*39000)+11000;}

    function showToast(){
      if(dismissed||sessionCount>=maxShows)return;
      var f=families[idx%families.length];
      var t=times[Math.floor(Math.random()*times.length)];
      msgEl.textContent='A family from '+f.city+', '+f.state+' just started an application';
      timeEl.textContent=t;
      toast.classList.add('is-visible');
      idx++;
      sessionCount++;
      try{sessionStorage.setItem('fcp_toast_session_count',String(sessionCount));}catch(e){}
      try{localStorage.setItem('fcp_toast_last_shown',String(Date.now()));}catch(e){}
      hideTimer=setTimeout(function(){
        toast.classList.remove('is-visible');
        if(!dismissed&&sessionCount<maxShows){showTimer=setTimeout(showToast,randomDelay());}
      },6000);
    }

    closeBtn.addEventListener('click',function(){
      dismissed=true;
      toast.classList.remove('is-visible');
      clearTimeout(showTimer);
      clearTimeout(hideTimer);
      try{sessionStorage.setItem('fcp_toast_session_count','done');}catch(e){}
    });

    showTimer=setTimeout(showToast,randomDelay());
  })();
  </script>
</body>
</html>
