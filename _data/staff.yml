  bio_extended: |
    Vando Becheli brings a global perspective to Florida Coastal Prep as the PG Director and Assistant Athletic Director. A Brazilian native with 25 years of professional playing and coaching experience, Becheli has coached at the highest levels on multiple continents.

    Before joining FCP, he led Utah State University Eastern to over 120 wins in 8 seasons, including a Region XVIII championship and a third-place NJCAA national finish in 2009-2010.

