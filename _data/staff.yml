  bio: "Seventh-year Athletic Director with 25 years of basketball coaching across DI, DII, NAIA, and JUCO levels. Notable achievements include coaching Sean East (now in NBA G-League), Brandon Maclin (DePaul), Kylin Green (Houston Baptist), and Ring Malith (SIU Edwardsville)."
  bio_extended: |
    Lee DeForest has spent over two decades shaping the futures of student-athletes at every level of collegiate basketball. As the Athletic Director and Director of Operations at Florida Coastal Prep, he oversees all aspects of the program — from recruiting and player development to academics and college placement.

    His coaching career spans DI, DII, NAIA, and JUCO programs, giving him an unmatched network of college connections. Under his leadership, FCP has become one of the premier post-graduate basketball programs in the Southeast, consistently placing athletes at four-year institutions.

