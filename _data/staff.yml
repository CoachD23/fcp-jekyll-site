  bio_extended: |
    Vando Becheli brings a global perspective to Florida Coastal Prep as the National Post Grad Director and Assistant Athletic Director. A Brazilian native with 25 years of professional playing and coaching experience, Becheli has coached at the highest levels on multiple continents.

    Before joining FCP, Becheli served as head coach at Lighthouse Christian College, where he won 20 or more games every season — cementing his reputation as a program builder who elevates talent year after year. Prior to that, he led Utah State University Eastern to over 120 wins in 8 seasons, including a Region XVIII championship and a third-place NJCAA national finish in 2009-2010.

    His experience in Brazil's Top League contributed to athlete development resulting in NBA placements, and he assisted with the 2016 Rio Olympics basketball program. At FCP, Becheli oversees the post-graduate program and brings an international recruiting network that spans South America, Europe, and Asia.
