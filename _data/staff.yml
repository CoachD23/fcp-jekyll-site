- name: "Kenny Anderson"
  slug: "kenny-anderson"
  title: "Mentor & Leadership Trainer"
  section: "executive"
  badge: "NBA All-Star"
  image: "/assets/images/coaches/kenny-anderson.jpg"
  action_image: ""
  bio: "Queens, NY native and NBA legend: 1991 second overall pick, 14-year NBA career across eight teams, 1994 NBA All-Star. Former Fisk University head coach."
  bio_extended: |
    Kenny Anderson is one of the most decorated basketball minds in the country. A Queens, New York native, Anderson was the second overall pick in the 1991 NBA Draft and went on to play 14 seasons in the NBA across eight teams.

    Selected as an NBA All-Star in 1994, Anderson's professional career included stints with the New Jersey Nets, Charlotte Hornets, Portland Trail Blazers, Boston Celtics, Seattle SuperSonics, LA Clippers, Atlanta Hawks, and Indiana Pacers.

    After retiring from professional play, Anderson transitioned to coaching, serving as head coach at Fisk University. At Florida Coastal Prep, he serves as Mentor and Leadership Trainer, working directly with players on ball handling, shooting mechanics, court vision, and the mental aspects of the game that only a 14-year NBA veteran can teach.
