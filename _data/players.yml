  image: /assets/images/players/ring-malith-siu-edwardsville-d1.jpeg
  bio: "Ring Malith's journey from Twic, South Sudan to the NCAA Tournament is one of the most remarkable stories in FCP history. At Florida Coastal Prep, the 6'9\" guard/forward developed the versatility that would define his career. He went on to win an NJCAA National Championship at Barton CC, set a Division I rebounding record at SIUE (19 rebounds), earn the OVC All-Tournament Team, win two OVC Player of the Week awards, and help lead SIUE to its first-ever NCAA Tournament appearance — all while leading the entire Ohio Valley Conference in scoring at 17.0 PPG as a senior."
