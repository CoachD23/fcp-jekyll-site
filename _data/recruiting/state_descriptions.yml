  academic and athletic goals.
oklahoma: >-
  Oklahoma presents a compelling recruiting landscape for in-state basketball talent, offering three distinct NCAA
  Division I pathways with varying competitive levels and conference affiliations. The Oklahoma Sooners and Oklahoma
  State Cowboys compete in the Big 12, one of college basketball's premier conferences, while the Tulsa Golden Hurricane
  operate in the American Athletic Conference as a respected mid-major program. This diversity allows recruits to
  evaluate opportunities across different competitive tiers without leaving the state. In-state athletes benefit from
  proximity to family, established coaching relationships, and reduced travel costs, yet exploring all three programs is
  essential. Each institution offers unique academic programs, playing styles, and development philosophies that may
  align differently with individual goals and aspirations.
rhode-island: >-
  Rhode Island offers high school basketball players a unique recruiting advantage with four Division I programs
  operating at different competitive levels. Providence Friars compete in the Big East Conference, one of the nation's
  premier leagues, while the University of Rhode Island competes in the Atlantic 10 Conference. Bryant University and
  Brown University represent mid-major and Ivy League opportunities respectively. This variety creates exceptional
  options for in-state recruits across skill levels and academic profiles. Athletes should seriously evaluate all four
  programs, as each offers distinct pathways to collegiate basketball. Proximity to campus, conference competitiveness,
  academic fit, and coaching philosophy should guide each recruit's decision-making process during their recruitment
  journey.
utah: >-
  Utah offers a diverse recruiting landscape with four NCAA Division I men's basketball programs serving different
  athlete profiles and academic interests. BYU and Utah compete in major conferences and receive national recruiting
  attention, while Weber State and Utah State operate in mid-major conferences with strong regional followings. This
  variety creates genuine opportunities for in-state recruits across different skill levels and academic backgrounds.
  Elite prospects often have their pick of programs, but mid-level talents benefit significantly from the local options,
  which provide pathways to collegiate basketball without leaving home. Every Utah high school athlete should seriously
  evaluate all four programs rather than overlooking mid-majors, as conference affiliation doesn't determine player
  development, playing time, or professional opportunities.

fl_d2:
  title: "D2 Basketball Programs in Florida"
  body: |
    Florida fields one of the most competitive clusters of NCAA Division II basketball programs in the
    country, all housed within the Sunshine State Conference. The eleven SSC members — Barry University,
    Eckerd College, Embry-Riddle Aeronautical University, Florida Southern College, Florida Tech, Lynn
    University, Nova Southeastern University, Palm Beach Atlantic University, Rollins College, Saint Leo
    University, and the University of Tampa — represent a tight geographic footprint stretching from
    South Florida north to the Space Coast. That density means conference road trips rarely exceed a few
    hours, keeping recruiting conversations grounded in genuine fit rather than travel logistics.

    D2 basketball Florida programs offer partial athletic scholarships, meaning award sizes vary by
    program, roster spot, and budget. Unlike Division I, there are no full-ride guarantees, so recruits
    should ask each school directly about scholarship stacking with academic or institutional aid.
    Schools like Nova Southeastern, Florida Southern, and Tampa have sustained strong postseason
    records, which draws serious mid-level talent and raises the competitive floor across the conference.
    Eckerd, Rollins, and Lynn sit in premier coastal or lakefront settings and often attract
    student-athletes who want a balance of competitive basketball and strong academic reputations.

    For a high school player evaluating D2 basketball in Florida, the honest case is this: competition
    is real, schedules are demanding, and the Sunshine State Conference sends multiple teams to the
    NCAA D2 tournament most years. If a D1 offer has not materialized by late junior year, this
    conference should be on every prospect's call list — the quality of coaching, facilities, and
    post-graduation outcomes at many of these schools rivals programs competing a full division above.

fl_d3:
  title: "D3 Basketball Programs in Florida"
  body: |
    NCAA Division III basketball in Florida is a short list, and recruits should understand exactly
    what that means before targeting this level within the state. Florida hosts very few D3 programs,
    and none compete within a large, football-first D3 conference structure comparable to what exists
    in the Midwest or Northeast. In practice, most D3 basketball in Florida is played at smaller
    private liberal arts institutions — some of which are NAIA members rather than NCAA members —
    so prospects need to verify divisional status carefully when researching schools.

    What D3 basketball offers anywhere, including Florida, is genuine academic priority alongside
    competitive play. Division III programs cannot award athletic scholarships under NCAA rules.
    Financial aid is merit- and need-based, and admissions decisions are made by the academic office
    without athletic department influence. For the right student-athlete, that model offers significant
    freedom: you can change majors, study abroad, or take an internship without worrying about
    jeopardizing a scholarship.

    Players specifically committed to D3 basketball and who want to remain in Florida should expect a
    more limited in-state pool than in regions like the Northeast or Midwest. Expanding the search
    geographically — into the Southeast, Mid-Atlantic, or Great Lakes regions — opens access to dozens
    of well-resourced D3 programs within driving distance of Florida. Recruits should not confuse
    geographic proximity to home with the best competitive or academic fit. A D3 program in Georgia,
    Tennessee, or North Carolina may offer more playing time, a stronger conference schedule, and
    better institutional resources than limiting the search to Florida's small in-state D3 footprint.

fl_naia:
  title: "NAIA Basketball Programs in Florida"
  body: |
    Florida is one of the more active NAIA basketball states in the Southeast, anchored primarily by
    the Sun Conference — a ten-member league with eight Florida-based institutions. Schools including
    Ave Maria University, Florida Memorial University, Keiser University, New College of Florida,
    St. Thomas University, Warner University, and Webber International University all compete in
    The Sun Conference and maintain active men's basketball programs. The geographic spread covers
    South Florida, Central Florida, and the Treasure Coast, offering recruits a range of campus
    settings from urban Miami to small-town Babson Park.

    NAIA programs can award up to 11 equivalent scholarships in men's basketball, divided across
    rosters however coaching staffs choose. In practice, that means many players receive partial
    awards, and scholarship availability varies significantly from school to school. Recruits should
    ask coaches directly about current roster openings and typical award sizes rather than assuming
    full packages. Florida Memorial University, historically a HBCU, brings a distinct cultural
    identity to its program, while Ave Maria and Warner carry strong faith-based missions that shape
    campus culture.

    For a high school player who did not receive a D1 or D2 offer, NAIA basketball in Florida is a
    legitimate pathway — not a fallback. The Sun Conference competes nationally within NAIA, and
    players from Florida's NAIA programs have advanced to professional leagues abroad. The key
    evaluation questions are: Does the campus feel right? Does the coach have a track record of
    developing players who look like you athletically? And does the financial aid package, when
    combined with academic aid, make attendance genuinely affordable? If those three boxes check,
    NAIA basketball Florida programs deserve serious consideration.

fl_juco:
  title: "JUCO Basketball Programs in Florida"
  body: |
    Florida runs one of the largest and most competitive junior college basketball systems in the
    nation. All Florida community college programs operate under the Florida College System Activities
    Association (FCSAA), which also serves as NJCAA Region 8. The region includes over two dozen
    member schools, with the majority classified as NJCAA Division I. Historically strong programs
    include Northwest Florida State College, Tallahassee State College, Pensacola State College,
    Eastern Florida State College, Chipola College, and Daytona State College, among others.
    Pasco-Hernando State College competes at the NJCAA Division II level, which affects scholarship
    structure and tournament eligibility.

    JUCO basketball programs in Florida can award full athletic scholarships at the Division I level,
    covering tuition, fees, room, and board at in-state rates. That makes Florida's JUCO programs
    one of the most financially accessible entry points into college basketball anywhere in the
    country. For players who did not qualify academically out of high school, who need another year
    of physical development, or who want a shorter-term commitment before transferring to a four-year
    program, FCSAA schools offer a genuinely competitive environment with clear transfer pathways.

    Northwest Florida State has sent multiple players to Division I programs and sustained national
    tournament success over many years. Eastern Florida and Tallahassee State routinely produce
    NJCAA All-Americans and high-major transfers. The level of play inside Region 8 is consistently
    among the highest in the country, and coaches at four-year programs across every division actively
    scout FCSAA games. For any recruit still building their game or their academic record, JUCO
    basketball in Florida is not a detour — it is a direct route.

ia_d2:
  title: "D2 Basketball Programs in Iowa"
  body: |
    Iowa's NCAA Division II basketball presence centers on the Northern Sun Intercollegiate Conference
    (NSIC), a well-established D2 league covering schools across Iowa, Minnesota, Nebraska, and the
    Dakotas. The primary Iowa representative within the NSIC is Upper Iowa University, based in
    Fayette. Upper Iowa competes in the NSIC's South Division alongside schools like Wayne State
    (Nebraska), Augustana (South Dakota), and Southwest Minnesota State, which means Hawkeye State
    recruits will spend significant time on the road in neighboring states.

    D2 basketball in Iowa at the NSIC level means partial athletic scholarships — programs may award
    up to 10 full equivalencies divided across a roster, and actual per-player packages reflect each
    school's budget and roster priorities. Upper Iowa operates on a small-college campus in northeast
    Iowa, which shapes both the campus culture and the recruiting draw. Athletes who thrive in close-
    knit, rural academic settings often find it a strong fit; those seeking a larger campus environment
    may want to evaluate schools in the broader NSIC footprint across state lines.

    For Iowa high school players who want to stay close to home while competing at the D2 level, the
    NSIC provides legitimate competition and NCAA tournament access. The conference regularly sends
    multiple teams to the national tournament, and coaching staffs are active in Iowa prep recruiting.
    Recruits should evaluate program trajectory, scholarship availability, and academic support
    alongside geographic preference. Staying in-state is not always the strongest move — the best
    D2 fit may be 90 minutes across the Minnesota or Nebraska border.

ia_d3:
  title: "D3 Basketball Programs in Iowa"
  body: |
    Iowa may be the strongest Division III basketball state in the Midwest. The American Rivers
    Conference — formerly the Iowa Intercollegiate Athletic Conference, rebranded in 2018 — is
    composed almost entirely of Iowa institutions: Buena Vista University, Central College, Coe
    College, University of Dubuque, Loras College, Luther College, Simpson College, and Wartburg
    College. Nebraska Wesleyan is the lone out-of-state member. The depth of competition within
    this single Iowa-centric conference is notable, with multiple programs reaching the NCAA D3
    tournament in recent years and Wartburg carrying a national reputation in wrestling and
    multi-sport excellence.

    Division III basketball programs in Iowa offer no athletic scholarships. Financial aid is
    determined entirely by academic merit and demonstrated financial need. What that means
    practically is that the application process starts with the financial aid office, not the
    athletics department. Recruits should run net-price calculator estimates for each school before
    committing to campus visits, as tuition varies and award packages can differ substantially
    between schools with similar D3 labels.

    For a player who wants serious basketball competition, a genuine college experience, and the
    flexibility that comes without scholarship strings, the American Rivers Conference is a
    legitimate destination. Loras, Wartburg, and Coe have all fielded nationally ranked teams
    in recent seasons. Luther, despite an upcoming conference move to the Midwest Conference for
    the 2026-27 academic year, remains a competitive program through the current cycle. The
    conference plays in a tight geographic corridor, travel is manageable, and family support
    from Iowa prep communities is strong throughout the season.

ia_naia:
  title: "NAIA Basketball Programs in Iowa"
  body: |
    Iowa is one of the most active NAIA basketball states in the country, with programs spread
    across two major NAIA conferences. The Heart of America Athletic Conference (HAAC) includes
    several Iowa schools in its North Division: Clarke University (Dubuque), Graceland University
    (Lamoni), Grand View University (Des Moines), St. Ambrose University (Davenport, joining as
    full member for 2026-27), and William Penn University (Oskaloosa). The Great Plains Athletic
    Conference (GPAC) adds three more Iowa programs: Briar Cliff University (Sioux City), Dordt
    University (Sioux Center), and Northwestern College (Orange City). Together these schools
    represent eight active NAIA men's basketball programs within Iowa's borders.

    NAIA programs can award up to 11 equivalent scholarships in men's basketball. Grand View,
    William Penn, and Graceland have all been competitive nationally within the NAIA over recent
    seasons, with William Penn reaching the 2026 NAIA Men's Basketball National Championship as
    the Heart Conference Tournament champion. Dordt and Northwestern consistently compete in the
    GPAC's upper half, a conference that sends multiple teams to the national tournament most years.
    Briar Cliff competes in an athletically demanding corner of Iowa alongside GPAC peers in Nebraska
    and South Dakota.

    For Iowa high school players, the NAIA landscape offers something the Division I programs in
    Ames and Iowa City cannot — a genuine opportunity to play meaningful minutes from year one.
    Scholarship packages are real, and several Iowa NAIA coaches have strong track records of
    developing players who later transfer upward or pursue professional opportunities abroad.
    Any prospect who is honest with themselves about their current level should include at least
    two or three Iowa NAIA programs in their evaluation alongside their four-year NCAA targets.

ia_juco:
  title: "JUCO Basketball Programs in Iowa"
  body: |
    Iowa's junior college basketball system operates through the Iowa Community College Athletic
    Conference (ICCAC), which also serves as NJCAA Region 11 — covering Iowa and a portion of
    northeast Nebraska. ICCAC member schools with men's basketball programs include Hawkeye
    Community College (Waterloo), Iowa Central Community College (Fort Dodge), Iowa Lakes
    Community College (Estherville), Marshalltown Community College, North Iowa Area Community
    College (Mason City), Northeast Iowa Community College (Calmar/Peosta), Southeastern Community
    College (West Burlington), and Western Iowa Tech (Sioux City), among others. The conference
    competes at the NJCAA Division II level, which is important context for recruits evaluating
    scholarship eligibility and national tournament access.

    NJCAA Division II programs can offer partial scholarships, typically covering partial tuition
    and fees rather than full room and board. For Iowa players who need a year or two to develop
    athletically, who want to establish or repair an academic record before transferring to a
    four-year program, or who are weighing program fit without committing to a four-year institution,
    ICCAC schools offer a low-cost, accessible entry point. In-state tuition at Iowa community
    colleges is among the most affordable in the Midwest.

    JUCO basketball programs in Iowa do not generate the national scouting traffic that Florida's
    NJCAA Division I programs attract, but they serve a practical purpose for the right recruit.
    Transfer pathways to Iowa's NAIA schools, D3 programs, and occasionally D2 programs are well
    established, and ICCAC coaches maintain relationships with coaches across all four-year levels.
    Players who put in the work and earn ICCAC All-Conference recognition do get noticed. The
    question is not whether the level is serious — it is whether the two-year timeline and the
    partial-scholarship structure make financial and developmental sense for an individual's situation.

ca_juco:
  title: "JUCO Basketball Programs in California"
  body: |
    California hosts the largest junior college basketball system in the United States. The California
    Community College Athletic Association — now officially operating as the 3C2A — oversees more than
    100 men's basketball programs spread across the state's 116 community colleges. Unlike NJCAA-governed
    programs in most other states, 3C2A schools do not award athletic scholarships. California community
    colleges provide financial aid based entirely on academic and financial eligibility, which means the
    cost equation for a player attending a 3C2A school is determined by the federal aid formula, not by
    a coach's recruiting budget.

    That distinction matters enormously. A California JUCO prospect who qualifies for full financial aid
    may attend a program like Fullerton College, City College of San Francisco, Citrus College, East
    Los Angeles College, or San Bernardino Valley College at effectively no cost — and play against
    some of the highest-level junior college competition in the country without any scholarship strings
    attached. The state's size means conferences are regionally organized, and the Central Valley,
    Bay Area, Southern California, and San Diego regions each have their own competitive pecking orders.

    For recruiting purposes, California JUCO basketball is a significant transfer pipeline into D1,
    D2, NAIA, and four-year programs nationwide. Coaches across the country — including high-major D1
    programs — actively recruit out of the 3C2A, particularly from programs with sustained postseason
    records. The volume of talent moving through the California community college system is unmatched,
    which raises the competitive baseline but also means that standout players get genuine exposure.
    Any recruit considering JUCO basketball programs in California should understand the no-athletic-
    scholarship model upfront and plan their financial aid timeline accordingly.

tx_juco:
  title: "JUCO Basketball Programs in Texas"
  body: |
    Texas is home to one of the most competitive junior college basketball regions in the country.
    NJCAA Region XIV covers East Texas and a portion of western Louisiana, encompassing programs
    that have sent players to the highest levels of college and professional basketball for decades.
    Current Region XIV members with men's basketball programs include Angelina College, Blinn
    College, Coastal Bend College, Kilgore College, Lamar State College-Port Arthur, Lee College,
    Navarro College, Panola College, Paris Junior College, Trinity Valley Community College, and
    Tyler Junior College. All are NJCAA Division I programs, meaning full athletic scholarships
    covering tuition, fees, room, and board are available.

    Tyler Junior College and Kilgore College are among the most historically decorated JUCO
    programs in the country. Kilgore defeated Tyler in the 2025 Region XIV championship game,
    and both programs consistently earn national tournament berths. Navarro College gained
    widespread visibility through documentary coverage of its football program, but its basketball
    program is equally serious within NJCAA circles. Trinity Valley and Blinn have also produced
    multiple players who transferred to Division I programs and contributed immediately.

    For recruits evaluating JUCO basketball programs in Texas, the honest assessment is this:
    Region XIV may be the toughest two-year conference in the country at the NJCAA level. Players
    who earn starts or significant minutes in this region have demonstrated something verifiable.
    The transfer market out of Texas JUCO into D1 programs is active and documented. If a full
    D1 offer has not come out of high school, earning one at Kilgore, Tyler, or Navarro is a
    realistic and respected path — provided a player is willing to compete in an environment with
    no roster guarantees and daily accountability.

ny_d3:
  title: "D3 Basketball Programs in New York"
  body: |
    New York has one of the deepest NCAA Division III basketball landscapes in the country. Two
    conferences alone — the Liberty League and the State University of New York Athletic Conference
    (SUNYAC) — account for more than a dozen programs, and additional New York schools compete in
    the Empire 8, Skyline Conference, and the New England Small College Athletic Conference. The
    Liberty League includes nationally recognized programs such as RPI, Union College, Rochester
    Institute of Technology, Hobart and William Smith Colleges, St. Lawrence University, and
    Skidmore College. The SUNYAC features SUNY Oswego, SUNY Cortland, SUNY Plattsburgh, SUNY
    Fredonia, SUNY Oneonta, and SUNY Potsdam, among others.

    Division III basketball programs in New York offer no athletic scholarships. Aid is merit- and
    need-based through each school's financial aid office. The practical range is wide: a student
    attending a SUNY school may pay significantly less out of pocket than one attending a private
    Liberty League member like Union or Hobart, which carry higher sticker prices offset by
    institutional merit awards. Recruits should run the net price calculator for every school
    seriously in their search, not just those with the most familiar names.

    Competitively, D3 basketball in New York is legitimate. The Liberty League and SUNYAC regularly
    produce NCAA tournament qualifiers, and the depth within each conference means non-conference
    wins require the same preparation as conference games. For a player who wants high-level
    competition, strong academics, access to New York State's career networks, and athletic
    participation without a scholarship-driven power dynamic, D3 basketball in New York is as
    strong an option as exists anywhere in Division III.

nc_d2:
  title: "D2 Basketball Programs in North Carolina"
  body: |
    North Carolina is one of the strongest NCAA Division II basketball states in the country, with
    programs spread across two conferences serving the region. The South Atlantic Conference (SAC)
    includes North Carolina's most prominent D2 programs: Barton College (Wilson), Catawba College
    (Salisbury), Lenoir-Rhyne University (Hickory), and Wingate University (Wingate). Lenoir-Rhyne
    in particular has elevated its national profile, reaching the NCAA D2 Elite Eight in the 2024-25
    season after winning both the SAC Tournament and the Southeast Regional title. Conference
    Carolinas adds additional North Carolina D2 programs including Belmont Abbey College (Belmont),
    Barton, and others in a league where the basketball calendar remains active and competitive.

    D2 basketball programs in North Carolina can award partial athletic scholarships — up to 10
    full equivalencies divided across rosters in men's basketball. Actual per-player packages depend
    on program budget and roster construction, so recruits should ask directly what a realistic
    offer looks like when combined with academic and need-based institutional aid. In a state where
    D1 programs like Duke, UNC, and NC State dominate the recruiting conversation, D2 programs
    benefit from genuine player development focus and coaching staffs who are specifically invested
    in players who land at their level.

    For any North Carolina high school player who is honest about their D1 offer picture by mid-
    junior year, the SAC and Conference Carolinas deserve immediate attention. The geographic
    concentration of programs means recruits can visit multiple schools in a single trip. Lenoir-
    Rhyne, Catawba, Barton, and Wingate each have distinct campus identities, academic profiles,
    and coaching approaches — which means fit varies meaningfully even within a small state. The
    work of finding the right D2 program in North Carolina is worth doing carefully.


# Non-D1 state blurbs (title + body format)

ca_d2:
  title: "D2 Basketball Programs in California"
  body: |
    California fields one of the largest NCAA Division II basketball footprints in the country,
    with approximately twenty programs concentrated in two conferences. The California Collegiate
    Athletic Association (CCAA) is the dominant conference, including Cal State East Bay, Cal State
    Dominguez Hills, Cal State San Marcos, Cal State San Bernardino, Cal State Monterey Bay, Chico
    State, Sonoma State, Humboldt State, and Cal Poly Pomona, among others. UC San Diego
    transitioned to Division I through the Big West, but the CCAA remains one of the deepest D2
    basketball conferences in the nation and consistently sends multiple teams to the NCAA D2
    tournament.

    D2 basketball programs in California can award up to 10 full equivalencies in men's basketball,
    divided across rosters as each coaching staff chooses. Because these are California State
    University system schools, in-state tuition rates are significantly lower than private D2
    institutions, and scholarship dollars can be stacked with Cal Grants, Pell Grants, and
    institutional aid to bring net cost down substantially. Recruits should run the net price
    calculator for each school, then discuss the realistic scholarship offer with coaches directly.

    For a high school player from California who did not receive a D1 offer, the CCAA is among the
    best D2 conference options anywhere in the country — not a fallback, but a legitimate
    competitive environment with solid academic infrastructure, real postseason access, and
    proximity to family. The geographic range of programs from San Diego north to Humboldt means
    recruits can find campus settings ranging from urban commuter campuses to smaller, residential
    college towns. Fit varies widely within the conference. Athletes from FCP programs benefit from
    early exposure to this level through our recruiting network and direct relationships with CCAA
    coaching staffs.

ca_d3:
  title: "D3 Basketball Programs in California"
  body: |
    NCAA Division III basketball in California is a smaller but genuinely competitive pool anchored
    by the Southern California Intercollegiate Athletic Conference (SCIAC) and independent programs.
    SCIAC members with men's basketball include California Institute of Technology (Caltech), Chapman
    University, Claremont-Mudd-Scripps, University of La Verne, Occidental College, Pomona-Pitzer
    Colleges, University of Redlands, and Whittier College. These programs operate on the campuses
    of some of California's most academically selective private institutions, and the conference
    plays an unusually compact schedule given the geographic proximity of most members in the Los
    Angeles and Inland Empire region.

    Division III programs in California offer no athletic scholarships. Financial aid is merit- and
    need-based, and sticker prices at SCIAC institutions can be high. However, private liberal arts
    schools in this conference often have significant endowments and substantial institutional aid
    budgets, so a student from a middle-income family may receive a larger total aid package than
    expected. Running the net price calculator before a campus visit is essential. The admissions
    process is academically driven — coaches can advocate, but the academic office makes the final
    call.

    For a student-athlete who values elite academics alongside competitive basketball and wants to
    remain in California, SCIAC programs represent a distinctive opportunity. Caltech is the most
    academically selective D3 program in the country; Chapman and Occidental sit in the top tier
    of California private liberal arts schools. The basketball itself is competitive — SCIAC teams
    routinely reach the NCAA D3 tournament — and the professional and academic networks available
    through these institutions are exceptional. FCP athletes who meet the academic profile for
    SCIAC schools gain a meaningful recruiting angle that more athletically focused players often
    overlook.

ca_naia:
  title: "NAIA Basketball Programs in California"
  body: |
    California hosts a substantial NAIA basketball ecosystem, with approximately sixteen programs
    competing primarily in the Golden State Athletic Conference (GSAC) and the California Pacific
    Conference (Cal Pac). GSAC members include Vanguard University (Costa Mesa), Westmont College
    (Santa Barbara), Hope International University (Fullerton), Marymount California University,
    and several other faith-affiliated institutions in Southern California. The Cal Pac features
    additional California NAIA programs including Dominican University of California (San Rafael),
    Menlo College (Atherton), and William Jessup University (Rocklin).

    NAIA programs can award up to 11 equivalent scholarships in men's basketball. In practice,
    packages vary by school and are rarely full grants-in-aid — recruits should ask coaches directly
    about the realistic per-player award size and how it combines with academic and institutional
    aid. Several California NAIA programs are faith-based, which shapes campus culture meaningfully.
    Recruits should understand the mission of each school alongside its basketball program before
    committing.

    The GSAC and Cal Pac together offer an active competitive calendar that feeds into the NAIA
    national tournament. Programs like Westmont have sustained strong national profiles within the
    NAIA, and the Bay Area and Southern California programs draw from deep local talent pools.
    For a California recruit who did not receive an NCAA offer but wants to play legitimate college
    basketball close to home, California's NAIA programs are a real option — not a placeholder.
    The evaluation process should mirror what any serious D2 recruit would do: visit campuses, ask
    coaches about roster openings and scholarship availability, and verify that the academic
    program fits long-term career goals.

ny_d2:
  title: "D2 Basketball Programs in New York"
  body: |
    New York fields one of the more competitive clusters of NCAA Division II basketball programs
    on the East Coast, with approximately fourteen programs competing primarily in the Northeast-10
    Conference (NE-10) and the East Coast Conference (ECC). Northeast-10 members in New York
    include Adelphi University (Garden City), Le Moyne College (Syracuse), Molloy University
    (Rockville Centre), and St. Thomas Aquinas College (Sparkill). The ECC includes New York
    programs such as Mercy University (Dobbs Ferry), Long Island University Post, New York
    Institute of Technology, Queens College (CUNY), and Roberts Wesleyan University (Rochester).

    D2 basketball programs in New York can award up to 10 full equivalencies in men's basketball,
    divided across rosters as coaching staffs determine. The suburban New York City setting of
    programs like Adelphi, LIU Post, Mercy, and NYIT means recruits gain access to the metropolitan
    area's professional networks, internship pipelines, and alumni communities while competing at
    the D2 level. Upstate programs like Le Moyne and Roberts Wesleyan offer smaller-city settings
    with strong regional reputations and close-knit basketball cultures.

    For a New York high school player who is honest about their D1 offer picture by junior year,
    the NE-10 and ECC deserve immediate attention. These conferences are competitive — NE-10
    programs regularly qualify for the NCAA D2 tournament, and coaching staffs in the region
    actively recruit New York prep talent. Programs like Adelphi and Le Moyne have histories of
    developing players who go on to professional opportunities. FCP athletes who have trained at
    a high prep level can compete at this level immediately, and our relationships with coaches
    across both conferences create direct recruiting pathways.

ny_juco:
  title: "JUCO Basketball Programs in New York"
  body: |
    New York hosts one of the largest junior college basketball systems in the country, with
    approximately 36 programs operating under NJCAA Region 15. The geographic range spans New York
    City's five boroughs north through the Hudson Valley, west through the Southern Tier, east
    through Long Island, and up through the North Country. Notable programs include Sullivan
    Community College (Loch Sheldrake), Nassau Community College (Garden City), Suffolk County
    Community College (Selden), Monroe Community College (Rochester), Rockland Community College
    (Suffern), Orange County Community College (Middletown), Dutchess Community College
    (Poughkeepsie), Jefferson Community College (Watertown), and Herkimer County Community
    College (Herkimer). The majority of New York JUCO programs compete at the NJCAA Division III
    level, which means no athletic scholarships are available — financial aid is institutional
    and need-based only.

    That scholarship structure is the most important thing any New York JUCO recruit needs to
    understand upfront. Unlike Florida or Texas JUCO programs that offer full athletic grants,
    New York's NJCAA Division III programs operate on the same financial aid model as community
    colleges in California — what you receive depends on your FAFSA, not on a coach's budget.
    Sullivan Community College has historically competed at a higher level and has produced
    notable transfers, but even programs with strong competitive reputations in New York cannot
    supplement that with athletic money.

    For a recruit who needs two years of competitive basketball and academic development before
    transferring to a four-year program, New York JUCO provides a genuine pathway. The transfer
    pipeline from New York community colleges into D3, NAIA, and occasionally D2 programs is
    active and well-documented. Coaches across all levels recruit out of Region 15. The honest
    case for a New York JUCO is this: it is a financially accessible entry point with a clear
    transfer pathway, but not a scholarship opportunity. Plan the financial piece first.

ny_uscaa:
  title: "USCAA Basketball Programs in New York"
  body: |
    New York has approximately thirteen member institutions in the United States Collegiate Athletic
    Association (USCAA), the governing body for the smallest colleges in American higher education.
    USCAA programs are typically small private colleges, religious institutions, or specialized
    universities with enrollments under 1,000 students. These schools operate with limited athletic
    budgets, and scholarship availability — while possible at some USCAA members — is inconsistent
    and should be verified directly with each institution.

    USCAA basketball competes at a level below NCAA Division III. The competition is genuine and
    the game is real, but recruits should understand the distinction: USCAA programs are not NCAA
    members, their competitions do not count toward NCAA statistics, and transfer pathways to
    NCAA programs require careful attention to eligibility rules. For a student-athlete whose
    primary goal is playing competitive basketball while completing a degree at a small, affordable
    private institution in New York, USCAA programs can serve that purpose.

    The practical evaluation questions for a USCAA prospect are straightforward: Does the academic
    program match your career goals? Is the total cost of attendance — after all aid — genuinely
    affordable? And is the level of basketball consistent with your development goals? USCAA
    programs should not be the first call for a recruit with realistic D3, NAIA, or JUCO options.
    But for a player who values campus culture, small class sizes, and the opportunity to play at
    any collegiate level, New York's USCAA members offer a legitimate, if modest, pathway.

tx_d2:
  title: "D2 Basketball Programs in Texas"
  body: |
    Texas fields approximately twelve NCAA Division II basketball programs across two primary
    conferences. The Lone Star Conference (LSC) is the dominant D2 league in Texas, including
    programs such as Tarleton State University (Stephenville), West Texas A&M University (Canyon),
    UT Permian Basin (Odessa), UT Tyler, Texas A&M-Kingsville, Angelo State University (San Angelo),
    and St. Edward's University (Austin). The South Central Association of Colleges and Schools
    (SCC/Red River Athletic Conference) adds programs from the Dallas-Fort Worth area, including
    Dallas Baptist University and Lubbock Christian University. St. Mary's University (San Antonio)
    rounds out the LSC's Texas contingent.

    D2 basketball programs in Texas can award up to 10 full equivalencies in men's basketball,
    divided across rosters. The Lone Star Conference is one of the better-resourced D2 conferences
    in the country, with facilities and program investment that at some schools approaches lower-tier
    D1 quality. Tarleton State and West Texas A&M have both made sustained runs at the national
    level, and the LSC sends multiple teams to the NCAA D2 tournament most years. The geographic
    spread of programs across the state means recruits from Houston, Dallas-Fort Worth, San Antonio,
    and West Texas each have realistic proximity options.

    For a Texas high school player who did not land a D1 offer by junior year, the Lone Star
    Conference should be on the call list immediately. The level of play is serious, coaching staffs
    across the conference actively recruit in-state Texas talent, and the transfer pathway from D2
    into graduate programs or professional leagues abroad is documented. FCP athletes who have
    competed at a high prep level are well-positioned for D2 Texas programs — coaches in the LSC
    value the preparation and discipline that come from a structured prep year.

tx_d3:
  title: "D3 Basketball Programs in Texas"
  body: |
    Texas has approximately sixteen NCAA Division III basketball programs competing primarily in
    the Southern Collegiate Athletic Conference (SCAC) and independent status. SCAC members in
    Texas include Trinity University (San Antonio), Southwestern University (Georgetown), Texas
    Lutheran University (Seguin), Schreiner University (Kerrville), Sul Ross State University
    (Alpine), and Hardin-Simmons University (Abilene), among others. Additional Texas D3 programs
    include the University of Texas at Dallas, Howard Payne University (Brownwood), and McMurry
    University (Abilene). Texas Wesleyan University competes at the NAIA level, so recruits
    should verify current divisional affiliation when researching schools.

    Division III programs in Texas offer no athletic scholarships. Financial aid is merit- and
    need-based, and the cost of attendance varies significantly between SCAC institutions — from
    smaller faith-affiliated colleges with modest endowments to schools like Trinity, which
    has a substantial institutional aid budget and consistently ranks among the top D3 academic
    institutions in the South. Running the net price calculator at each school before a campus
    visit is essential for understanding the realistic financial picture.

    The SCAC is a competitive D3 conference that has produced multiple national tournament
    qualifiers. Trinity in particular has an outsized academic and athletic reputation within
    the D3 landscape. For a Texas recruit who is academically strong and wants a balance of
    serious competition and genuine academic investment without the scholarship power dynamic,
    the SCAC is worth exploring carefully. FCP athletes who meet the academic profiles of SCAC
    schools bring a prep training background that translates well at D3, where basketball IQ
    and skill development are valued over raw athleticism.

tx_naia:
  title: "NAIA Basketball Programs in Texas"
  body: |
    Texas hosts approximately eleven NAIA basketball programs, primarily in the Red River Athletic
    Conference (RRAC). RRAC members in Texas include Wiley College (Marshall), Huston-Tillotson
    University (Austin), Jarvis Christian University (Hawkins), Paul Quinn College (Dallas), Texas
    College (Tyler), and Southwestern Assemblies of God University (Waxahachie). Several of these
    institutions are Historically Black Colleges and Universities (HBCUs), which bring distinct
    cultural identities and campus missions that shape both recruiting and student experience. The
    RRAC competes regionally and sends the conference champion to the NAIA national tournament.

    NAIA programs can award up to 11 equivalent scholarships in men's basketball, divided across
    rosters. Because several Texas NAIA programs are smaller institutions with limited athletic
    budgets, actual per-player awards often represent partial aid rather than full grant-in-aid
    packages. Recruits should ask coaches directly what the current roster opening looks like and
    what a realistic financial aid package — combining athletic scholarship with federal and
    institutional aid — actually totals. The HBCU mission of several Texas NAIA programs is a
    legitimate recruiting draw for the right student-athlete, not simply a financial option.

    For a Texas recruit without a D1, D2, or JUCO offer, NAIA programs in the RRAC offer a
    pathway to competitive college basketball, a degree, and in some cases a platform for
    professional development. The level of competition is real. Coaches in the RRAC have track
    records of developing players who later pursue professional basketball abroad. The evaluation
    framework should be the same as any other level: Does the campus fit? Does the coach develop
    players who look like you athletically? And does the financial package make attendance
    genuinely affordable?

nc_d3:
  title: "D3 Basketball Programs in North Carolina"
  body: |
    North Carolina has approximately eight NCAA Division III basketball programs, several of which
    compete in the USA South Athletic Conference or as Conference Carolinas members at the D3 level.
    Programs include Greensboro College (Greensboro), Guilford College (Greensboro), Methodist
    University (Fayetteville), North Carolina Wesleyan University (Rocky Mount), and Peace University
    (Raleigh), among others. The geographic concentration of multiple D3 programs in the Piedmont
    and Triangle regions creates a natural competitive cluster with meaningful conference schedules
    and manageable travel.

    Division III programs in North Carolina offer no athletic scholarships. Aid is merit- and
    need-based, and sticker prices at North Carolina's private D3 institutions vary. The practical
    aid picture depends on each school's endowment, and recruits should run the net price calculator
    at every school before committing to a campus visit. North Carolina's D3 programs sit within a
    state that is saturated with D1 recruiting activity, which means D3 coaches here are accustomed
    to recruiting players who were legitimately on D1 radar and landed at D3 for financial, academic,
    or playing-time reasons — not simply because they ran out of options.

    For a North Carolina recruit who is academically strong and wants a genuine college experience
    alongside competitive basketball without the scholarship-driven power dynamic, the state's D3
    programs are underutilized options. Guilford and Greensboro in particular sit in a city with
    multiple college campuses, strong career networks, and access to professional sports culture
    that most D3 settings cannot match. FCP athletes who land at North Carolina D3 programs bring
    a prep year of professional training that coaches at this level consistently value.

nc_juco:
  title: "JUCO Basketball Programs in North Carolina"
  body: |
    North Carolina operates one of the most active junior college basketball systems in the Southeast,
    with approximately sixteen programs competing in the NJCAA. The majority of North Carolina JUCO
    programs are members of Region 10 and compete within the National Junior College Athletic
    Association structure. Conference affiliations include the Western Division and Eastern Division
    of the Carolina Community College Conference, with programs at Alamance Community College
    (Graham), Catawba Valley Community College (Hickory), Cleveland Community College (Shelby),
    Davidson-Davie Community College (Lexington), Forsyth Technical Community College
    (Winston-Salem), Gaston College (Dallas), Johnston Community College (Smithfield), and several
    others spread across the Piedmont and eastern regions of the state.

    Most North Carolina JUCO programs compete at the NJCAA Division II level, meaning partial
    athletic scholarships are available — typically covering tuition and fees rather than full room
    and board. Recruits should ask coaches directly about the current award structure and how
    scholarship dollars combine with Pell Grants and state aid at North Carolina community colleges.
    In-state tuition at North Carolina community colleges is among the most affordable in the
    Southeast, which meaningfully changes the net cost calculation relative to out-of-state JUCO
    options.

    For a North Carolina recruit who needs two years of competitive development before transferring
    to a four-year program, the state's JUCO system offers a genuinely local option. Transfer
    pathways from North Carolina JUCO programs into the state's D2 programs (Lenoir-Rhyne, Catawba,
    Barton, Wingate), D3 schools, NAIA programs, and out-of-state four-year programs are all
    active. Coaches at four-year programs in the Carolinas recruit directly out of the JUCO level.
    The key evaluation question is not whether the level is real — it is whether the two-year
    model and partial-scholarship structure make sense for an individual player's development
    timeline.

nc_naia:
  title: "NAIA Basketball Programs in North Carolina"
  body: |
    North Carolina hosts two active NAIA men's basketball programs, both members of Conference
    Carolinas. Belmont Abbey College (Belmont) and Chowan University (Murfreesboro) represent the
    state's NAIA basketball footprint. Conference Carolinas is primarily a D2 conference, and both
    programs compete in a mixed-division conference structure — which means NAIA teams in this
    conference regularly face NCAA D2 opponents on their schedules. That competitive context is
    unusual and worth understanding: a recruit at an NC NAIA program will play against D2-level
    opposition more often than NAIA-only conference schedules in other states.

    NAIA programs can award up to 11 equivalent scholarships in men's basketball. As with all
    NAIA programs, recruits should ask coaches directly what the realistic per-player scholarship
    looks like and how it stacks with institutional and federal aid. The small size of North
    Carolina's NAIA pool means recruiting competition for spots at these two programs is real,
    and coaches are selective about roster construction given the limited number of available
    positions each cycle.

    For a North Carolina recruit who is evaluating NAIA basketball as a legitimate collegiate
    option, the small in-state pool means the search should extend to Conference Carolinas
    members in South Carolina, Virginia, and the broader Southeast — not just the two North
    Carolina programs. The NAIA landscape nationally is deep, and programs in neighboring
    states may offer better scholarship packages, more roster openings, or stronger fits
    academically and athletically than limiting the search to geography alone.

nc_uscaa:
  title: "USCAA Basketball Programs in North Carolina"
  body: |
    North Carolina has two member institutions in the United States Collegiate Athletic Association
    (USCAA), the governing body for the smallest colleges in American higher education. USCAA
    programs are typically small private institutions with enrollments under 1,000 students.
    Scholarship availability at USCAA members is inconsistent and should be confirmed directly
    with each school — some programs offer partial athletic aid while others operate entirely
    on institutional and need-based financial structures.

    USCAA basketball competes below the NCAA Division III level. For a recruit with realistic
    D3, NAIA, or JUCO options, those pathways should be evaluated first. USCAA programs serve
    a specific profile of student-athlete: someone who values small class sizes, close community,
    and the opportunity to play competitive basketball at an accessible college, often at a lower
    total cost of attendance than larger institutions. The transfer pathway from USCAA into
    NCAA programs is manageable but requires careful attention to eligibility rules and timing.

    The honest evaluation framework for North Carolina's USCAA programs mirrors what applies
    at every level: Does the academic program serve your career goals? Is the total cost of
    attendance — after all available aid — genuinely affordable? And does the basketball
    environment match your development priorities? With only two in-state USCAA options,
    recruits interested in this level should also look at USCAA members across the Southeast,
    where a larger pool of programs provides more opportunities to find the right campus,
    program fit, and financial package.
