  structured environment to reset and rebuild their recruiting case, the Catskills campus
  provides that with legitimate basketball attached.
suny-tompkins-cortland-community-college: >-
  SUNY Tompkins Cortland competes in the Hudson Valley Athletic Conference out of Dryden, near
  Ithaca in the Finger Lakes region. The Ithaca area is an academically rich environment — Ithaca
  College and Cornell are neighbors — which sets a standard for academic seriousness. The HVAC
  is a functional NJCAA conference within New York's community college system, and SUNY's transfer
  pathways are well-established. TC3 gives players a competitive basketball environment alongside
  a campus culture that takes education seriously. That combination is useful if your goal is
  to transfer into a program with genuine academic standards.
suny-ulster-county-community-college: >-
  SUNY Ulster County Community College plays in the Hudson Valley Athletic Conference out of
  Stone Ridge, in the Hudson Valley wine country between Poughkeepsie and Kingston. The HVAC
  is an NJCAA conference serving Upstate New York players, and SUNY Ulster's manageable campus
  size means you'll get real coaching attention and real playing time. In-state tuition keeps
  costs in check, and the SUNY transfer system creates direct academic pathways to four-year
  programs. For Hudson Valley players who need two years to prove themselves, this is a
  quiet, functional platform.
suny-westchester-community-college: >-
  SUNY Westchester Community College plays in the Hudson Valley Athletic Conference out of
  Valhalla — Westchester County, a New York suburb with professional-level basketball culture
  and proximity to every major recruiting market in the Northeast. The HVAC draws players from
  across the state, and Westchester's location keeps you visible to scouts from Metro New York
  programs. In-state SUNY tuition makes it financially accessible, and the transfer pathways
  within the SUNY system are clear. For NYC-area and Westchester players who need two years
  of productive JUCO basketball, this is one of the most strategically located programs in
  the conference. Florida Coastal Prep helps metro players prepare for college competition —
  learn more at floridacoastalprep.com.
the-community-college-of-baltimore-county-catonsville: >-
  CCBC Catonsville competes in the Maryland-DC Athletic Conference out of Baltimore, part of one
  of the Mid-Atlantic's most active JUCO basketball markets. The MDCAC connects players to
  recruiting networks across Maryland, DC, and Virginia, and Baltimore basketball culture is
  serious — the city produces real players and the competition reflects that. CCBC's multi-campus
  system gives you institutional stability while you compete at a level that four-year programs
  in the region actively scout. Two years of film from the MDCAC, with your academics in order,
  creates genuine transfer options across the Chesapeake corridor.
the-community-college-of-baltimore-county-dundalk: >-
  CCBC Dundalk plays in the Maryland-DC Athletic Conference out of Baltimore County, competing in
  a JUCO circuit that has consistent transfer activity into Mid-Atlantic four-year programs. The
  East Baltimore location gives you access to Baltimore's basketball infrastructure while the
  MDCAC keeps you on the radar of programs across Maryland and the DMV. CCBC's institutional
  resources — advising, academic support, transfer coordination — are real advantages for players
  navigating both the athletic and academic sides of the JUCO path. Show up ready to compete and
  the conference will do the rest of the selling for you.
trinidad-state-college: >-
  Trinidad State College competes in the Scenic West Athletic Conference out of Trinidad, Colorado —
  a small program in the high plains of Southeast Colorado with a focused mission: develop players
  and get them to four-year programs. The SWAC is a Mountain West NJCAA conference with transfer
  connections into Colorado's Division II landscape and programs across the Mountain Time Zone.
  Trinidad's small-campus environment means direct coaching attention and real minutes from day one.
  For players who need two years away from the noise, in an environment where basketball and
  academics are the only priorities, Trinidad State delivers exactly that.
university-of-arkansas-cossatot: >-
  University of Arkansas – Cossatot competes in NJCAA Arkansas Community Colleges out of De Queen,
  in Southwest Arkansas near the Oklahoma border. This is a small, rural program where the
  opportunity for real minutes is high and the commitment to player development is personal — small
  rosters mean coaches actually know your game. The Southwest Arkansas location keeps you in a
  region with connections to Arkansas, Oklahoma, and Louisiana four-year programs. For players
  from that region who need two years to build their academic eligibility and sharpen their game,
  Cossatot is a realistic, underutilized option. Florida Coastal Prep develops players for
  programs at exactly this level — floridacoastalprep.com.
university-of-connecticut-avery-point: >-
  UConn – Avery Point competes in the New England Athletic Conference out of Groton, Connecticut —
  the Southeastern Connecticut shoreline. Playing under the UConn brand, even at the branch campus
  level, carries institutional credibility and access to advising resources that most JUCO programs
  can't match. The NEAC is a functional NJCAA conference serving New England, and Avery Point's
  location puts you in a region with real academic transfer options. The maritime campus setting
  is distinct — small, focused, and away from distractions. For Connecticut players who want two
  years of development with the UConn academic infrastructure behind them, Avery Point is an
  overlooked option.
university-of-south-carolina-salkehatchie: >-
  USC Salkehatchie competes in the Carolinas Athletic Association out of Walterboro, in the South
  Carolina Lowcountry. Playing under the University of South Carolina brand gives players
  institutional credibility and academic transfer pathways into the four-year USC system. The CAA
  is a competitive NJCAA conference across the Carolinas, and USC Salkehatchie's connection to the
  flagship university makes it a genuinely strategic choice for South Carolina players. Two years
  here with solid academics can open direct pathways to USC Columbia or other South Carolina
  four-year institutions. The Lowcountry setting is quiet and focused — ideal for players who
  need that environment.
university-of-wisconsin-baraboo-sauk-county: >-
  UW – Baraboo-Sauk County competes in the Northern Athletic Conference out of Baraboo, Wisconsin,
  between Madison and the Wisconsin Dells. The NAC is a NJCAA conference serving Wisconsin's
  two-year programs, and UW Baraboo's connection to the University of Wisconsin system creates
  clear academic transfer pathways to UW four-year campuses. The program draws players from across
  Wisconsin who want two years of development with the institutional support of the UW system
  behind them. Small campus means real playing time and direct coaching. For Wisconsin players
  with four-year transfer ambitions, the UW branch campus system is a strategically smart path.
university-of-wisconsin-fond-du-lac: >-
  UW – Fond du Lac competes in the Northern Athletic Conference out of Fond du Lac, Wisconsin, on
  the south shore of Lake Winnebago. Like other UW branch campuses, the connection to the
  University of Wisconsin system is a genuine academic advantage — transfer pathways to UW
  four-year programs are clearly established and actively supported. The NAC is a Wisconsin JUCO
  conference where competition is honest and development is real. For players in the Fox Valley
  and Northeast Wisconsin region looking for two years of local basketball with four-year transfer
  upside, UW-FDL provides that with UW credibility attached. Florida Coastal Prep builds players
  for programs like this — see floridacoastalprep.com or /apply/.
uw-stevens-point-at-marshfield: >-
  UW-Stevens Point at Marshfield competes in the Northern Athletic Conference out of Marshfield,
  in Central Wisconsin. The UW system affiliation means academic resources, transfer support, and
  institutional credibility that independent JUCO programs can't offer. The NAC is a functional
  Wisconsin JUCO conference, and Marshfield's central location connects you to recruiting networks
  across the state. This is a practical two-year plan for Central Wisconsin players who want to
  develop athletically, build academic eligibility, and use the UW transfer system to reach a
  four-year program. Small campus, real minutes, clear path forward.
uw-stevens-point-at-wausau: >-
  UW-Stevens Point at Wausau competes in the Northern Athletic Conference out of Wausau, Wisconsin.
  Like all UW branch campuses, the institutional connection to the University of Wisconsin system
  provides real academic transfer pathways that matter beyond basketball. The NAC keeps you
  competitive in Wisconsin's JUCO circuit while you build toward a four-year transfer. Wausau is
  a mid-sized Wisconsin market — enough going on to stay engaged, small enough to stay focused.
  For North-Central Wisconsin players, this is the logical local option with legitimate basketball
  and a clear academic road map.
west-virginia-university-potomac-state-college: >-
  WVU Potomac State College competes in the Penn-Jersey Athletic Conference out of Keyser, West
  Virginia, in the Eastern Panhandle near the Maryland border. Carrying the West Virginia University
  brand gives players academic credibility and clear transfer pathways into WVU's four-year system
  — a distinct advantage over independent JUCO programs. The PJAC is a competitive Mid-Atlantic
  NJCAA conference, and Potomac State's location puts you accessible to recruiting markets across
  West Virginia, Maryland, and Virginia. For Appalachian-region players who want two years of
  development with a clear path to WVU or other Mid-Atlantic four-year programs, Potomac State
  is a strategically sound choice.
