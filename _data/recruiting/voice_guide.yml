# ─── DESCRIPTION SPEC ───────────────────────────────────────────────────────
spec:
  min_words: 150
  max_words: 250
  format: yaml_block_scalar   # >- in school_descriptions.yml
  must_include_fcp_cta: true
  must_name_head_coach: true  # always reference the coach by name
  must_name_conference: true
  no_fabricated_stats: true   # never invent win totals, rankings, or specific records
