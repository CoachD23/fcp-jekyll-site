america-east-conference: >-
  The America East Conference is a competitive NCAA Division I league featuring nine schools across the Northeast,
  including established programs like New Hampshire, Vermont, and Maine alongside emerging competitors like UMBC and
  Bryant. Playing in the America East provides student-athletes significant exposure through regular television
  broadcasts and a clear pathway to NCAA Tournament competition, as the conference champion receives an automatic bid.
  The conference attracts dedicated, fundamentally sound players who value strong academic institutions and rigorous
  competition. Athletes here develop under experienced coaching staffs while competing against quality opponents in a
  respected mid-major environment. Recruits should expect a legitimate Division I experience with genuine advancement
  opportunities toward professional basketball or successful post-college careers.
asun-conference: >-
  The ASUN Conference competes at the NCAA Division I level and provides serious student-athletes with legitimate
  pathways to postseason play and professional opportunities. Member programs like Lipscomb, Bellarmine, and Florida
  Gulf Coast have demonstrated tournament success, establishing the conference as a competitive mid-major destination.
  Playing in the ASUN develops players through rigorous competition while offering consistent media exposure and
  recruitment visibility to professional scouts and NBA scouts. The conference tournament provides an annual NCAA
  Tournament access point, giving teams opportunities to compete on the national stage. Recruits who thrive in this
  environment typically demonstrate strong athleticism, basketball intelligence, and commitment to competing against
  quality Division I talent. The ASUN attracts three-level prospects seeking developmental programs within a competitive
  conference structure.
american-conference: >-
  The American Athletic Conference offers high-level NCAA Division I basketball with 13 member institutions competing
  across a robust schedule. Playing in the AAC provides recruits excellent exposure through consistent television
  coverage and a legitimate pathway to NCAA Tournament participation, with multiple bids available annually. The
  conference attracts talented athletes who have developed significantly at the high school level and are ready for
  college basketball's demands. AAC programs emphasize skill development, strength and conditioning, and competitive
  depth that prepares players for professional opportunities. Schools like Memphis and Temple maintain strong basketball
  traditions, while programs across the league provide quality coaching, facilities, and resources. The AAC represents a
  competitive mid-major conference where serious basketball players can develop while gaining national recognition.
atlantic-10-conference: >-
  The Atlantic 10 Conference competes at the mid-major level and offers student-athletes consistent exposure to
  high-quality basketball while maintaining strong academic standards. Playing in the A-10 provides regular television
  coverage and opportunities to compete against well-coached programs with tournament pedigrees. The conference sends
  multiple teams to the NCAA Tournament annually, creating legitimate pathways to postseason play. Recruits at this
  level typically possess solid fundamentals, athleticism, and basketball intelligence, often developing into
  professional prospects or competing at higher levels. The A-10 suits three-star athletes and talented two-star players
  seeking significant playing time, development within a competitive framework, and genuine chances to earn
  all-conference recognition. Schools prioritize both on-court performance and degree completion.
big-12-conference: >-
  The Big 12 Conference stands as a premier collegiate basketball destination featuring 16 competitive programs with
  rich traditions and national prominence. Playing in this conference means competing against elite talent night in and
  night out, developing your game against tournament-caliber opponents while gaining significant exposure to NBA scouts
  and national media coverage. Big 12 programs consistently earn NCAA Tournament bids, providing athletes with
  postseason opportunities at basketball's highest level. The conference attracts skilled guards, versatile forwards,
  and athletic big men who thrive in a fast-paced, physical style of play. Recruiting to the Big 12 signals you're
  prepared to compete immediately at an elite level while building a platform for professional aspirations.
big-east-conference: >-
  The Big East Conference stands as one of college basketball's premier leagues, featuring 11 programs committed to
  competing at the highest level. Playing in the Big East means competing against consistently strong opponents in a
  conference that produces multiple NCAA Tournament teams annually. The exposure is substantial, with games broadcasted
  nationally and scout attention intense throughout the season. The conference develops NBA-caliber talent through
  rigorous competition and elite coaching. Successful Big East players demonstrate high basketball IQ, versatility, and
  competitiveness. The conference virtually guarantees NCAA Tournament access for competitive teams, with multiple bids
  distributed yearly. For recruits seeking significant playing time at a major conference level with legitimate
  professional aspirations, the Big East offers the platform to compete, develop, and showcase skills against top-tier
  talent.
big-sky-conference: >-
  The Big Sky Conference competes at the NCAA Division I level and features ten schools including Sacramento State,
  Idaho, Montana State, Montana, Idaho State, Eastern Washington, Northern Colorado, Northern Arizona, Portland State,
  and Weber State. Playing in the Big Sky provides student-athletes with quality competition, strong coaching, and a
  path toward NCAA Tournament consideration through the conference tournament. The league attracts versatile,
  hard-working players who excel fundamentally and demonstrate commitment to both academics and basketball development.
  Exposure comes through conference play against regional opponents and potential postseason opportunities. Big Sky
  athletics balance genuine college experiences with serious basketball development, making the conference appealing for
  recruits seeking competitive play, coach evaluation, and visibility for professional aspirations.
big-ten-conference: >-
  The Big Ten Conference stands as one of college basketball's premier competitive landscapes, featuring eighteen member
  schools committed to excellence and player development. Competition at this level demands versatile athletes with high
  basketball IQ, athleticism, and the ability to thrive in a physical, defensive-oriented environment. Playing in the
  Big Ten provides exceptional exposure through national television coverage and guarantees consistent NCAA Tournament
  access, with multiple conference teams competing annually in March. The conference's consistent production of
  NBA-ready talent and strong coaching infrastructure ensures recruits receive elite development opportunities. Success
  in the Big Ten requires sustained effort, resilience against top-tier competition, and commitment to improvement. For
  serious college basketball players, the Big Ten represents an ideal platform for both competitive excellence and
  professional advancement.
big-west-conference: >-
  The Big West Conference represents a competitive mid-major basketball environment featuring eleven schools across
  California and Hawaii. Programs like Long Beach State and UC Santa Barbara consistently contend for conference titles
  and NCAA Tournament bids, providing legitimate pathways to postseason play. Athletes in the Big West develop their
  games against quality competition while maintaining strong academic standards across respected universities. The
  conference offers excellent exposure for guards and versatile forwards who can handle the college game's pace and
  intensity. Playing in the Big West demonstrates a recruit's ability to compete at an advanced level, making it an
  attractive option for players seeking meaningful minutes, NCAA Tournament opportunities, and genuine preparation for
  professional basketball beyond college.
conference-usa: >-
  Conference USA offers high school recruits an opportunity to compete in a mid-major NCAA Division I conference with a
  strong tradition of developing talent and earning NCAA Tournament berths. The conference features competitive programs
  across twelve schools, including established powerhouses like Western Kentucky, Louisiana Tech, and New Mexico State,
  alongside rising programs like Liberty and Sam Houston. Playing at this level provides significant exposure to
  professional scouts while competing against quality opponents in a respected conference. C-USA athletes develop
  through rigorous competition, strong coaching, and media coverage that extends their visibility beyond their region.
  The conference regularly produces NBA talent and consistently fills NCAA Tournament brackets. Recruits here are
  typically high-level scorers, athletic defenders, and skilled playmakers capable of competing at the professional
  level while earning their degrees at respected universities.
coastal-athletic-association: >-
  The Colonial Athletic Association offers a competitive mid-major platform where high school athletes develop their
  craft against skilled opponents while maintaining realistic paths to NCAA Tournament play. The conference features
  programs like Northeastern, Towson, and Charleston that consistently compete at elevated levels. Playing in the CAA
  provides meaningful exposure to professional scouts and NBA scouts, as well as international basketball opportunities.
  Recruits here are typically versatile, fundamentally sound players who excel defensively and value ball movement. The
  league emphasizes basketball IQ and team play over individual athleticism alone. CAA schools prepare players for
  post-collegiate opportunities while competing in a conference that produces regular NCAA Tournament bids and
  developmental pathways for continued basketball advancement.
ivy-league: >-
  The Ivy League represents the highest level of collegiate basketball among Division I non-scholarship conferences,
  featuring eight prestigious universities that compete for one automatic NCAA Tournament berth annually. Playing in the
  Ivy League develops complete student-athletes who balance elite academics with serious basketball competition. The
  conference emphasizes fundamental skill development, basketball intelligence, and disciplined team play. Ivy programs
  provide significant exposure to professional scouts and NBA personnel despite limited media coverage, as the caliber
  of competition and player development remains exceptionally high. Recruits thrive in this environment when they
  possess strong academic credentials, genuine love for the game, and commitment to excellence both in the classroom and
  on the court. The Ivy League launches successful careers in professional basketball and prepares athletes for life
  beyond the sport.
mountain-west-conference: >-
  The Mountain West Conference represents a respected mid-major basketball platform featuring twelve competitive
  programs across the western United States. Playing in the MW demands athleticism, basketball IQ, and the ability to
  compete at a high level against quality opponents night in and night out. The conference consistently produces NCAA
  Tournament bids and develops players for the professional level. Recruits in the MW receive substantial exposure
  through conference play, tournament opportunities, and media coverage that attracts NBA scouts and international
  leagues. The typical Mountain West athlete demonstrates strong fundamentals, versatility, and the mental toughness
  required to succeed in a rigorous conference schedule. This environment accelerates player development while providing
  a legitimate pathway to postseason play and professional opportunities.
metro-atlantic-athletic-conference: >-
  The Metro Atlantic Athletic Conference represents a competitive mid-major platform where quality Division I basketball
  is played with consistent NCAA Tournament access. Home to schools like Niagara, Fairfield, and Marist, the MAAC
  attracts athletic guards and versatile forwards capable of executing at a high level while competing for tournament
  bids annually. Student-athletes develop under coaches who emphasize skill refinement, basketball IQ, and defensive
  fundamentals. The conference's strong Regional positioning provides excellent exposure to professional scouts and
  mid-major coaching staffs. Recruits who thrive here demonstrate basketball maturity, coachability, and athleticism
  beyond the high school level. The MAAC offers genuine opportunities for playing time, conference championships, and
  postseason tournament basketball for committed athletes.
mid-eastern-athletic-conference: >-
  The Mid-Eastern Athletic Conference represents one of the nation's premier historically Black college athletics
  conferences, featuring eight competitive institutions including Howard, Morgan State, Norfolk State, and North
  Carolina Central. Competition within the MEAC develops well-rounded basketball players through rigorous conference
  play and consistent NCAA Tournament access. Programs emphasize skill development, academic achievement, and community
  engagement alongside athletic excellence. The conference attracts disciplined athletes seeking meaningful college
  experiences within supportive environments that prioritize both on-court performance and educational advancement.
  Playing in the MEAC provides exposure to professional scouts and coaching staffs while competing against quality
  opponents. Student-athletes gain visibility through televised conference games and postseason tournament
  participation, creating legitimate pathways toward professional opportunities.
missouri-valley-conference: >-
  The Missouri Valley Conference represents a strong mid-major platform where student-athletes compete at a high level
  while maintaining substantial NCAA Tournament access. The conference regularly sends teams to postseason play and
  provides excellent exposure to professional scouts and coaches. Playing in the MVC develops well-rounded competitors
  who thrive in a competitive environment with quality coaching and significant game experience against talented
  opponents. Members like Bradley, Southern Illinois, and Belmont consistently field competitive teams that challenge
  student-athletes daily. Recruits who excel here typically possess strong basketball fundamentals, athleticism, and
  work ethic. The MVC offers genuine pathways to professional opportunities while delivering legitimate college
  competition that prepares athletes for the next level both athletically and academically.
patriot-league: >-
  The Patriot League is a competitive NCAA Division I conference featuring ten schools that balance athletic excellence
  with strong academic standards. Playing in this league provides student-athletes significant exposure through regular
  NCAA Tournament access, with the conference champion earning an automatic bid and consistent at-large selections. The
  Patriot League attracts disciplined, versatile players who thrive in a academically rigorous environment while
  competing against quality opponents. The conference emphasizes fundamentals, ball movement, and defensive intensity.
  Athletes develop in a setting where education and basketball are equally prioritized, preparing them for success
  beyond college. The league's regional presence in the Northeast generates substantial media attention and creates
  natural recruiting pipelines to professional basketball opportunities.
southern-conference: >-
  The Southern Conference represents a competitive NCAA Division I platform where serious basketball players develop
  while pursuing genuine NCAA Tournament opportunities. The conference's ten members, including Furman, Chattanooga,
  East Tennessee State, Mercer, and Wofford, consistently compete at a high mid-major level and regularly earn
  postseason berths. Student-athletes in the SoCon benefit from strong coaching, regional recruiting bases, and quality
  competition that prepares them for professional basketball or successful careers beyond sport. The conference attracts
  skilled guards and versatile forwards who value balanced programs emphasizing academic achievement. Playing in the
  Southern Conference provides meaningful exposure to professional scouts and NBA scouts while competing against
  programs with rich traditions and tournament-tested experience.
southeastern-conference: >-
  The Southeastern Conference represents one of college basketball's most competitive and tradition-rich leagues,
  featuring powerhouse programs like Kentucky, Auburn, and Arkansas that consistently compete for national
  championships. Playing in the SEC demands elite athleticism, basketball intelligence, and the ability to perform
  against NBA-caliber talent night after night. Recruits develop rapidly in this high-octane environment while receiving
  maximum exposure to professional scouts and coaches. The conference's depth ensures near-automatic NCAA Tournament
  access for strong programs, with multiple teams frequently advancing deep into March. The SEC attracts guards and
  wings with exceptional ball-handling and shooting ability, as well as versatile big men capable of defending multiple
  positions. Only the most skilled and dedicated high school prospects thrive in this demanding conference.
ohio-valley-conference: >-
  The Ohio Valley Conference competes at the NCAA Division I level and represents a rigorous stepping stone for serious
  college basketball players. Member schools including Southern Indiana, Little Rock, Eastern Illinois, and Morehead
  State field competitive programs that develop talent through challenging conference play and NCAA Tournament access.
  The OVC provides meaningful exposure to scouts and coaches while offering a balanced college experience. Athletes
  competing in this conference typically possess solid fundamentals, athleticism, and competitiveness but may need
  developmental time before NBA consideration. The conference schedule demands toughness and consistency, preparing
  players for professional basketball or successful careers beyond the sport. OVC basketball offers genuine collegiate
  competition with legitimate postseason opportunities.
northeast-conference: >-
  The Northeast Conference represents a competitive NCAA Division I platform where student-athletes develop their skills
  against solid mid-major competition. With ten member institutions including Fairleigh Dickinson, Stonehill, Central
  Connecticut, and others, the conference provides meaningful exposure to coaches, scouts, and media while maintaining a
  manageable travel footprint across the Northeast and Midwest. Conference winners earn NCAA Tournament berths, offering
  postseason opportunities for successful teams. This level attracts disciplined players who excel both athletically and
  academically, seeking balanced college experiences. Recruits here typically demonstrate consistent fundamentals,
  basketball intelligence, and adaptability. Playing in the Northeast Conference establishes valuable credentials for
  professional or graduate opportunities while competing against quality opponents who challenge development and growth
  throughout the season.
atlantic-coast-conference: >-
  The Atlantic Coast Conference represents one of college basketball's most prestigious and competitive leagues,
  featuring eighteen elite programs including Duke, North Carolina, Louisville, and Florida State. Playing in the ACC
  demands exceptional athleticism, basketball intelligence, and resilience against top-tier competition night after
  night. The conference's national reputation ensures consistent NCAA Tournament access and widespread television
  exposure that benefits player development and professional visibility. ACC athletes compete against high-major talent
  daily, accelerating skill growth and preparing prospects for the next level. Recruits joining this conference should
  possess significant high school credentials, including varsity starting experience, strong athleticism, and the
  ability to defend multiple positions. The ACC's competitive environment and media prominence make it an ideal showcase
  for serious college basketball prospects.
big-south-conference: >-
  The Big South Conference represents a competitive NCAA Division I platform where dedicated basketball players develop
  their skills against quality competition while pursuing postseason opportunities. The nine-member conference includes
  established programs like Winthrop and High Point that regularly compete at a high level. Playing in the Big South
  provides student-athletes with significant exposure to scouts and coaches through conference play, tournaments, and
  potential NCAA Tournament berths available to conference champions and strong tournament finishers. Recruits who
  thrive here typically possess solid athletic ability, basketball fundamentals, and the work ethic to compete at the
  collegiate level. The conference offers genuine pathways to professional opportunities while maintaining academic
  standards that support long-term student-athlete success beyond basketball.
horizon-league: >-
  The Horizon League is a competitive mid-major conference featuring eleven universities across the Midwest and
  Northeast. Competition centers on defensive intensity, fundamental basketball, and well-coached programs that develop
  individual talent. Playing in the Horizon League provides student-athletes with regular NCAA Tournament access, strong
  mid-week television exposure, and development opportunities within a respected conference that produces professional
  and overseas talent. Recruits thrive in this environment when they possess strong work ethic, basketball IQ, and
  willingness to embrace team-oriented play. The conference attracts skilled guards, athletic forwards, and centers
  capable of competing at the Division I level while maintaining academic standards. Success here often leads to
  professional opportunities and advanced degrees.
mid-american-conference: >-
  The Mid-American Conference represents a competitive mid-major basketball environment where athletes develop their
  skills against quality opponents while maintaining realistic paths to postseason play. The conference's thirteen
  members, including Kent State, Akron, and Ohio, consistently compete for NCAA Tournament berths and regularly produce
  professional prospects. Playing in the MAC provides meaningful exposure to scouts and coaches through conference
  tournaments and NCAA Tournament appearances, with games broadcast across regional and national networks. Recruits who
  thrive here are typically versatile, fundamentally sound athletes with college-level athleticism who value immediate
  playing time and development. The MAC emphasizes defensive intensity and team play, making it an ideal stepping stone
  for players aspiring to higher professional levels.
